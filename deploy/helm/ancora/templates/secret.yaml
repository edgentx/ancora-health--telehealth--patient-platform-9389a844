{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ancora.secretName" . }}
  namespace: {{ include "ancora.namespace" . }}
  labels:
    {{- include "ancora.labels" . | nindent 4 }}
type: Opaque
# Values default to empty strings — no secret material is committed to the
# chart. Supply real values at install time (--set-file / sealed-secrets /
# external-secrets) or point secrets.existingSecret at a pre-provisioned Secret.
stringData:
  {{- range $key, $val := .Values.secrets.data }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end -}}
