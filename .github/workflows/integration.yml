name: API Integration Suite

# S-75 — API-level integration test suite across bounded contexts. Spins up
# ephemeral MongoDB and Redis, boots the HTTP server over the real repositories
# with stubbed external adapters, and drives representative flows end-to-end
# (booking with double-book prevention, encounter documentation, prescription
# submission via the pharmacy adapter, invoice/payment reconciled by a signed
# webhook), emitting a coverage profile. This is the green-in-CI gate for the
# integration suite.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: API integration flows (real MongoDB + Redis)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Must satisfy the go.mod `go 1.24.0` directive; caching is on by
          # default (keyed on go.sum) so module downloads are reused across runs.
          go-version: '1.24'

      - name: Integration suite with coverage (live MongoDB + Redis)
        env:
          MONGODB_URI: mongodb://localhost:27017
          ANCO_REDIS_ADDR: localhost:6379
        run: make integration

      - name: Enforce integration coverage floor
        run: make cov-check PROFILE=coverage.integration.out COVERAGE_MIN=30

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: coverage.integration.out
          if-no-files-found: warn
